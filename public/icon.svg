<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="noteGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0d9042"/>
      <stop offset="50%" stop-color="#1db954"/>
      <stop offset="100%" stop-color="#1ed760"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1db954"/>
      <stop offset="100%" stop-color="#1ed760"/>
    </linearGradient>
  </defs>

  <!-- App background rounded rect -->
  <rect x="8" y="8" width="496" height="496" rx="80" ry="80" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="8" y="8" width="496" height="496" rx="80" ry="80" fill="none" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Green ring -->
  <circle cx="220" cy="256" r="140" fill="none" stroke="url(#ringGrad)" stroke-width="10" opacity="0.7"/>

  <!-- Music note -->
  <g transform="translate(180, 160)">
    <path d="M20 180V40l120-20v120" fill="none" stroke="url(#noteGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    <ellipse cx="0" cy="180" rx="35" ry="25" fill="url(#noteGrad)"/>
    <ellipse cx="118" cy="140" rx="35" ry="25" fill="url(#noteGrad)"/>
  </g>
</svg>
